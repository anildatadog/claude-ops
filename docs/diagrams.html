<!DOCTYPE html>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #c9d1d9; font-family: 'Courier New', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    header { padding: 16px 24px; border-bottom: 1px solid #30363d; background: #161b22; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    header h1 { font-size: 1.2rem; color: #58a6ff; font-weight: bold; }
    nav { display: flex; gap: 8px; }
    nav button { padding: 6px 12px; border-radius: 4px; font-size: 11px; font-family: inherit; cursor: pointer; border: 1px solid #30363d; background: transparent; color: #8b949e; transition: all 0.15s; }
    nav button:hover { border-color: #8b949e; color: #c9d1d9; }
    nav button.active { background: #1f6feb; border-color: #58a6ff; color: #fff; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; min-height: 0; overflow: hidden; }
    .diagram-wrap { width: 100%; height: 100%; max-width: 900px; max-height: 560px; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; background: #0d1117; display: flex; align-items: center; justify-content: center; }
    .diagram-wrap svg { width: 100%; height: 100%; display: block; }
    .diagram { display: none; width: 100%; height: 100%; }
    .diagram.active { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
    footer { padding: 10px; border-top: 1px solid #30363d; text-align: center; font-size: 10px; color: #8b949e; letter-spacing: 2px; text-transform: uppercase; flex-shrink: 0; }
  </style>
</head>
